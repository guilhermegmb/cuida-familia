services:
  - type: web
    name: cuidafamilia-backend
    runtime: node
    region: oregon
    plan: free
    rootDir: nodejs_space
    buildCommand: corepack enable && yarn install && yarn build
    startCommand: corepack enable && yarn start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: YARN_ENABLE_IMMUTABLE_INSTALLS
        value: "false"
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openai/gpt-4o-mini
      - key: DEFAULT_TIMEZONE
        value: America/Sao_Paulo
      - key: VALIDATE_TWILIO_SIGNATURE
        value: "false"
