
services:
  - type: web
    name: cuida-familia-backend
    env: docker
    plan: free
    autoDeploy: true

    envVars:
      - key: DATABASE_URL
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openai/gpt-4o-mini
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: CHECKIN_CRON
        value: "0 9 * * *"
      - key: REMINDERS_CRON
        value: "*/5 * * * *"
      - key: LOG_LEVEL
        value: INFO

    healthCheckPath: /health
